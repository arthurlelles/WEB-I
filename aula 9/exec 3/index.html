<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Verificação de Pessoa</h3>

    Nome: <input type="text" id="nome"><br>
    Idade: <input type="number" id="idade"><br>
    Altura: <input type="number" step="0.01" id="altura"><br>
    
    <button onclick="verificar()">Verificar</button>
    <p id="resultado"></p>

    <script>
        function verificar(){
            const nome = document.getElementById("nome").value;
            const idade = parseFloat(document.getElementById("idade").value);
            const altura = parseFloat(document.getElementById("altura").value);
        let msg;
  
        if(idade>=18 && idade<=35 && altura>1.86){
            msg = "Nome: " + nome;
        } else {
            msg = "Idade: " + idade + " - Altura: " + altura;        
        }
            document.getElementById("resultado").innerText = msg;
        }
</script>
</body>
</html>
