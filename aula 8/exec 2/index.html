<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="mes">Insira um número de 1 a 12:</label>
    <input type="number" id="mes" />
    <button onclick="mostrarMes()">Ver Mês</button>
    
    <p id="resultadoMes"></p>

    <script>
        function mostrarMes() {
            let mes = parseInt(document.getElementById("mes").value);
            let nomeMes = "";

            switch (mes) {
                case 1: nomeMes = "Janeiro"; break;
                case 2: nomeMes = "Fevereiro"; break;
                case 3: nomeMes = "Março"; break;
                case 4: nomeMes = "Abril"; break;
                case 5: nomeMes = "Maio"; break;
                case 6: nomeMes = "Junho"; break;
                case 7: nomeMes = "Julho"; break;
                case 8: nomeMes = "Agosto"; break;
                case 9: nomeMes = "Setembro"; break;
                case 10: nomeMes = "Outubro"; break;
                case 11: nomeMes = "Novembro"; break;
                case 12: nomeMes = "Dezembro"; break;
                default: nomeMes = "Número inválido. Digite entre 1 e 12.";
            }
            
            document.getElementById("resultadoMes").innerText = nomeMes;
        }
    </script>
</body>
</html>
