<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  
  <input type="text" id="fruta" placeholder="Nome da fruta">
  <button onclick="adicionar()">Adicionar</button>
  <button onclick="ordenar()">Ordenar</button>
  <button onclick="exibir()">Exibir</button>
  <ul id="lista"></ul>

  <script>
    let frutas = [];
    function adicionar(){
      const valor = document.getElementById("fruta").value;
      if(valor) frutas.push(valor);
      document.getElementById("fruta").value = "";
    }
    function ordenar(){
      frutas.sort();
    }
    function exibir(){
      const lista = document.getElementById("lista");
      lista.innerHTML = "";
      frutas.forEach(f => {
        const li = document.createElement("li");
        li.innerText = f;
        lista.appendChild(li);
      });
    }
  </script>

</body>
</html>
