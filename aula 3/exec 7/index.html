<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table, td, tr {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <table width="400px">
        <tr>
            <td><b>Item</b></td>
            <td><b>Quantidade</b></td>
            <td><b>Preço Unitario</b></td>
            <td><b>Total</b></td>
        </tr>
        <tr>
            <td>Produto 1</td>
            <td>2</td>
            <td>R$ 50,00</td>
            <td>R$ 100,00</td>
        </tr>
        <tr>
            <td>Produto 2</td>
            <td>1</td>
            <td>R$ 150,00</td>
            <td>R$ 150,00</td>
        </tr>
        <tr>
            <td colspan="3">Total Geral</td>
            <td>R$ 250,00</td>
        </tr>
    </table>
</body>
</html>
