<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul id="lista">
        <li>Item 1</li>
    </ul>

    <button onclick="adicionarItem()">Adicionar Novo Item</button>

    <script>
        function adicionarItem() {
            document.getElementById("lista").innerHTML += "<li>Novo item adicionado!</li>";
        }
    </script>
</body>
</html>
